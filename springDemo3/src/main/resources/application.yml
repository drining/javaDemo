server:
  port: 9002

spring:
  application:
    name: springDemo3
  datasource:
    url: jdbc:mysql://120.24.146.158:3306/demo3?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: 120.24.146.158
      port: 6379
      password: 123456
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ap-guangzhou
  bucket: oss-1310209398

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

springdoc:
  packages-to-scan: org.example.springdemo3.controller
  paths-to-match: /depts/**, /emps/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
